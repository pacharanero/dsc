# Gate `main` and every PR on formatting, lints, and tests. The tag-triggered
# release build (release.yml) does NOT run the suite, so this is the gate that
# keeps `main` releasable. Action SHAs are pinned with a `# vX.Y.Z` comment per
# house style; bump only after confirming the tag.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # e2e tests are gated on a test-forum config that isn't present in CI, so
      # they skip cleanly here; lib + offline integration tests run.
      - name: cargo test
        run: cargo test

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0

      - name: cargo test --locked
        run: cargo test --locked

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Prebuilt binary (seconds) rather than a from-source `cargo install`.
      - name: Install cargo-audit
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: cargo-audit
          fallback: none

      # Fails the job on any RustSec advisory affecting the locked tree, so a
      # vulnerable dependency is caught here rather than waiting on a Dependabot
      # email. A genuinely unfixable transitive advisory can be quarantined in
      # `audit.toml` (`[advisories] ignore = ["RUSTSEC-XXXX-NNNN"]`) with a note.
      - name: cargo audit
        run: cargo audit
