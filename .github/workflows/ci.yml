# Gate `main` and every PR on formatting, lints, and tests. The tag-triggered
# release build (release.yml) does NOT run the suite, so this is the gate that
# keeps `main` releasable. Action SHAs are pinned with a `# vX.Y.Z` comment per
# house style; bump only after confirming the tag.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # e2e tests are gated on a test-forum config that isn't present in CI, so
      # they skip cleanly here; lib + offline integration tests run.
      - name: cargo test
        run: cargo test
